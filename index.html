<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#14c4c6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="家事記録">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>家事記録</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <header class="top">
      <h1>家事記録</h1>
      <div class="data-buttons">
        <button id="exportDataButton" type="button">データ書き出し</button>
        <label>データ読み込み<input id="importDataInput" type="file" accept="application/json" hidden></label>
      </div>
    </header>

    <section class="control-area">
      <div class="picker-row">
        <select id="yearSelect" aria-label="西暦"></select>
        <select id="monthSelect" aria-label="月"></select>
      </div>

      <div class="period-switch" aria-label="前半後半選択">
        <button id="firstHalfButton" type="button">前半</button>
        <button id="secondHalfButton" type="button">後半</button>
      </div>

      <h2 id="periodTitle"></h2>
    </section>

    <section class="table-area">
      <div class="table-scroll">
        <table class="record-table">
          <thead>
            <tr>
              <th>日</th>
              <th>曜</th>
              <th>風呂掃除</th>
              <th>炊飯</th>
              <th>ゴミ集め</th>
              <th>掃除機</th>
              <th>おつかい</th>
              <th>+α</th>
            </tr>
          </thead>
          <tbody id="recordBody"></tbody>
        </table>
      </div>
    </section>

    <section id="summaryPanel" class="summary-panel hidden">
      <button id="summaryHeader" class="summary-header" type="button">
        <span class="summary-title">集計結果</span>
        <span id="collapsedSummary" class="collapsed-summary"></span>
        <span id="summaryArrow" class="summary-arrow">⌃</span>
      </button>

      <div id="summaryContent" class="summary-content">
        <div class="line"></div>
        <div class="summary-line"><span class="left-label">風呂掃除</span><span id="bathUnit" class="unit"></span><strong id="bathAmount"></strong></div>
        <div class="summary-line"><span class="left-label">炊飯</span><span id="riceUnit" class="unit"></span><strong id="riceAmount"></strong></div>
        <div class="summary-line"><span class="left-label">ゴミ集め</span><span id="trashUnit" class="unit"></span><strong id="trashAmount"></strong></div>
        <div class="summary-line"><span class="left-label">掃除機</span><span id="vacuumUnit" class="unit"></span><strong id="vacuumAmount"></strong></div>
        <div class="summary-line"><span class="left-label">おつかい</span><span id="shoppingUse" class="unit wide"></span><strong id="shoppingReward"></strong></div>
        <div class="summary-line"><span class="left-label">+α</span><span id="extraUnit" class="unit"></span><strong id="extraAmount"></strong></div>
        <div class="line"></div>
        <div class="summary-bottom">
          <strong id="shoppingUseBottom"></strong>
          <strong id="totalBottom"></strong>
        </div>
      </div>
    </section>

    <section class="action-row">
      <button id="summaryButton" type="button">集計</button>
      <button id="pdfButton" type="button">PDFを作成</button>
    </section>

  </main>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button id="modalDoneButton" type="button">完了</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <section id="printArea" class="print-area"></section>

  <script src="./app.js"></script>
</body>
</html>
