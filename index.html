<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#14c4c6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="家事記録">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>家事記録</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="stylesheet" href="./styles.css?v=22">

  <style>
    /* v19 最終上書き：左側選択UIを表の中央付近へ移動 */
    .side-controls {
      flex-basis: 72px !important;
      width: 72px !important;
      align-self: stretch !important;
      justify-content: flex-start !important;
      gap: 42px !important;
      padding-top: clamp(210px, 30svh, 270px) !important;
      padding-bottom: 0 !important;
      transform: none !important;
    }

    .side-controls .picker-row {
      gap: 12px !important;
    }

    .side-controls .period-switch {
      margin-top: 0 !important;
    }

    /* v19 最終上書き：おつかい金額を現在より大きく表示 */
    .record-table td:nth-child(7) .cell-sub {
      font-size: 28px !important;
      line-height: 1.05 !important;
      font-weight: 700 !important;
    }

    @media (max-width: 760px) {
      .side-controls {
        flex-basis: 72px !important;
        width: 72px !important;
        justify-content: flex-start !important;
        gap: 42px !important;
        padding-top: clamp(200px, 30svh, 260px) !important;
        padding-bottom: 0 !important;
      }

      .record-table td:nth-child(7) .cell-sub {
        font-size: 28px !important;
        line-height: 1.05 !important;
        font-weight: 700 !important;
      }
    }
  </style>


  <style>
    /* v20 最終上書き：左側選択UIをアプリ全体の中央へ固定 */
    .side-controls {
      position: fixed !important;
      left: 20px !important;
      top: 50svh !important;
      transform: translateY(-50%) !important;
      flex-basis: 72px !important;
      width: 72px !important;
      height: auto !important;
      align-self: auto !important;
      justify-content: flex-start !important;
      gap: 34px !important;
      padding: 0 !important;
      background: transparent !important;
      z-index: 50 !important;
    }

    .side-controls .picker-row {
      gap: 12px !important;
    }

    .side-controls .period-switch {
      margin-top: 0 !important;
    }

    /* 固定配置で左UIが表に被らないよう、表エリアの左余白を確保 */
    .table-area {
      padding-left: 90px !important;
    }

    /* v20: おつかい金額はv19より小さく、見やすい程度に調整 */
    .record-table td:nth-child(7) .cell-sub {
      font-size: 21px !important;
      line-height: 1.05 !important;
      font-weight: 600 !important;
    }

    @media (max-width: 760px) {
      .side-controls {
        left: 20px !important;
        top: 50svh !important;
        transform: translateY(-50%) !important;
        flex-basis: 72px !important;
        width: 72px !important;
        gap: 34px !important;
        padding: 0 !important;
      }

      .table-area {
        padding-left: 90px !important;
      }

      .record-table td:nth-child(7) .cell-sub {
        font-size: 21px !important;
        line-height: 1.05 !important;
        font-weight: 600 !important;
      }
    }
  </style>


  <style>
    /* v21 最終上書き：左側選択UIの間隔とおつかい金額サイズ */
    .side-controls {
      gap: 56px !important;
    }

    .side-controls .picker-row {
      gap: 12px !important;
    }

    .side-controls .period-switch {
      margin-top: 0 !important;
    }

    .record-table td:nth-child(7) .cell-sub {
      font-size: 19px !important;
      line-height: 1.05 !important;
      font-weight: 600 !important;
    }

    @media (max-width: 760px) {
      .side-controls {
        gap: 56px !important;
      }

      .record-table td:nth-child(7) .cell-sub {
        font-size: 19px !important;
        line-height: 1.05 !important;
        font-weight: 600 !important;
      }
    }
  </style>


  <style>
    /* v22 最終上書き：前半/後半はそのまま、年月選択だけ少し上へ */
    .side-controls .picker-row {
      transform: translateY(-24px) !important;
    }

    @media (max-width: 760px) {
      .side-controls .picker-row {
        transform: translateY(-24px) !important;
      }
    }
  </style>

</head>
<body>
  <main class="app">
    <header class="top">
      <h1>家事記録</h1>
    </header>

    <section class="control-area">
      <h2 id="periodTitle"></h2>
    </section>

    <section class="table-area">
      <aside class="side-controls" aria-label="年月と期間の選択">
        <div class="picker-row">
          <select id="yearSelect" aria-label="西暦"></select>
          <select id="monthSelect" aria-label="月"></select>
        </div>

        <div class="period-switch" aria-label="前半後半選択">
          <button id="firstHalfButton" type="button">前半</button>
          <button id="secondHalfButton" type="button">後半</button>
        </div>
      </aside>

      <div class="table-scroll">
        <table class="record-table">
          <thead>
            <tr>
              <th>日</th>
              <th>曜</th>
              <th>風呂掃除</th>
              <th>炊飯</th>
              <th>ゴミ集め</th>
              <th>掃除機</th>
              <th>おつかい</th>
              <th>+α</th>
            </tr>
          </thead>
          <tbody id="recordBody"></tbody>
        </table>
      </div>
    </section>

    <section id="summaryPanel" class="summary-panel hidden">
      <button id="summaryHeader" class="summary-header" type="button">
        <span class="summary-title">集計結果</span>
        <span id="collapsedSummary" class="collapsed-summary"></span>
        <span id="summaryArrow" class="summary-arrow">⌃</span>
      </button>

      <div id="summaryContent" class="summary-content">
        <div class="line"></div>
        <div class="summary-line"><span class="left-label">風呂掃除</span><span id="bathUnit" class="unit"></span><strong id="bathAmount"></strong></div>
        <div class="summary-line"><span class="left-label">炊飯</span><span id="riceUnit" class="unit"></span><strong id="riceAmount"></strong></div>
        <div class="summary-line"><span class="left-label">ゴミ集め</span><span id="trashUnit" class="unit"></span><strong id="trashAmount"></strong></div>
        <div class="summary-line"><span class="left-label">掃除機</span><span id="vacuumUnit" class="unit"></span><strong id="vacuumAmount"></strong></div>
        <div class="summary-line"><span class="left-label">おつかい</span><span id="shoppingUse" class="unit wide"></span><strong id="shoppingReward"></strong></div>
        <div class="summary-line"><span class="left-label">+α</span><span id="extraUnit" class="unit"></span><strong id="extraAmount"></strong></div>
        <div class="line"></div>
        <div class="summary-bottom">
          <strong id="shoppingUseBottom"></strong>
          <strong id="totalBottom"></strong>
        </div>
      </div>
    </section>

    <section class="action-row">
      <button id="summaryButton" type="button">集計</button>
      <button id="pdfButton" type="button">PDFを作成</button>
    </section>

  </main>

  <div id="modalBackdrop" class="modal-backdrop hidden">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <h3 id="modalTitle"></h3>
        <button id="modalDoneButton" type="button">完了</button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </section>
  </div>

  <section id="printArea" class="print-area"></section>

  <script src="./app.js?v=22"></script>
</body>
</html>
